name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 shellcheck-py pytest flask

      - name: Lint Python scripts
        run: flake8 app/ --max-line-length=127

      - name: Lint Bash scripts (shellcheck)
        run: shellcheck scripts/*.sh

      - name: Run tests
        run: pytest app/tests/ -v

      - name: Build Docker image
        run: docker build -t simple-app:latest ./app

      - name: Test container health
        run: |
          docker run -d -p 5000:5000 --name test-app simple-app:latest
          sleep 5
          curl --fail http://localhost:5000/health || (docker logs test-app && exit 1)
          docker stop test-app